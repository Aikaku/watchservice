<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>오류</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 16px;
      padding: 32px;
      text-align: center;
    }
    .icon { font-size: 40px; }
    .title { font-size: 18px; font-weight: 600; color: #f87171; }
    .desc { font-size: 13px; color: #94a3b8; max-width: 320px; line-height: 1.6; }
    button {
      margin-top: 8px;
      padding: 8px 24px;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }
    button:hover { background: #2563eb; }
  </style>
</head>
<body>
  <div class="icon">⚠️</div>
  <div class="title">서비스 시작 실패</div>
  <div class="desc">
    백엔드 서버를 시작하는 데 실패했습니다.<br>
    로그를 확인하거나 앱을 재시작해 주세요.
  </div>
  <button onclick="location.reload()">재시도</button>
</body>
</html>
