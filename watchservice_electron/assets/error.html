<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>오류</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      user-select: none;
    }

    /* 커스텀 타이틀바 */
    .titlebar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      height: 36px;
      background: #0f172a;
      -webkit-app-region: drag;
      flex-shrink: 0;
    }
    .titlebar-title {
      font-size: 12px;
      color: #64748b;
    }
    .titlebar-btns {
      display: flex;
      gap: 8px;
      -webkit-app-region: no-drag;
    }
    .titlebar-btn {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      color: transparent;
      transition: color 0.1s;
    }
    .titlebar-btn:hover { color: #00000088; }
    .btn-close { background: #ff5f57; }
    .btn-min   { background: #febc2e; }

    /* 본문 */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 24px;
      text-align: center;
    }
    .icon  { font-size: 38px; }
    .title { font-size: 17px; font-weight: 600; color: #f87171; }
    .desc  { font-size: 13px; color: #94a3b8; max-width: 320px; line-height: 1.6; }
    .btn-row { display: flex; gap: 8px; margin-top: 4px; }
    button {
      padding: 8px 22px;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }
    button:hover { background: #2563eb; }
    .btn-quit {
      background: #374151;
    }
    .btn-quit:hover { background: #4b5563; }
  </style>
</head>
<body>
  <div class="titlebar">
    <span class="titlebar-title">WatchService Agent — 오류</span>
    <div class="titlebar-btns">
      <button class="titlebar-btn btn-min"   onclick="minimize()" title="최소화">—</button>
      <button class="titlebar-btn btn-close" onclick="closeWin()" title="닫기">✕</button>
    </div>
  </div>
  <div class="content">
    <div class="icon">⚠️</div>
    <div class="title">서비스 시작 실패</div>
    <div class="desc" id="desc">
      백엔드 서버를 시작하는 데 실패했습니다.<br>
      로그를 확인하거나 앱을 재시작해 주세요.
    </div>
    <div class="btn-row">
      <button onclick="location.reload()">재시도</button>
      <button class="btn-quit" onclick="closeWin()">닫기</button>
    </div>
  </div>
  <script>
    const messages = {
      port: '포트 8080이 이미 다른 프로그램에서 사용 중입니다.<br>해당 프로그램을 종료한 후 앱을 재시작해 주세요.',
      crash: '백엔드 서버가 예기치 않게 종료되었습니다.<br>앱을 재시작해 주세요.',
      timeout: '서버가 60초 내에 응답하지 않았습니다.<br>앱을 재시작해 주세요.',
    };
    const reason = new URLSearchParams(location.search).get('reason');
    if (reason && messages[reason]) {
      document.getElementById('desc').innerHTML = messages[reason];
    }

    function minimize() {
      if (window.electronAPI) window.electronAPI.minimizeWindow();
    }
    function closeWin() {
      if (window.electronAPI) window.electronAPI.closeWindow();
      else window.close();
    }
  </script>
</body>
</html>
