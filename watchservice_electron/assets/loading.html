<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>시작 중...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      user-select: none;
    }

    /* 커스텀 타이틀바 */
    .titlebar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      height: 36px;
      background: #0f172a;
      -webkit-app-region: drag;
      flex-shrink: 0;
    }
    .titlebar-title {
      font-size: 12px;
      color: #64748b;
    }
    .titlebar-btns {
      display: flex;
      gap: 8px;
      -webkit-app-region: no-drag;
    }
    .titlebar-btn {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      color: transparent;
      transition: color 0.1s;
    }
    .titlebar-btn:hover { color: #00000088; }
    .btn-close  { background: #ff5f57; }
    .btn-min    { background: #febc2e; }

    /* 본문 */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 24px;
    }
    .title { font-size: 17px; font-weight: 600; color: #f1f5f9; }
    .subtitle { font-size: 13px; color: #94a3b8; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #334155;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="titlebar">
    <span class="titlebar-title">WatchService Agent</span>
    <div class="titlebar-btns">
      <button class="titlebar-btn btn-min"  onclick="minimize()" title="최소화">—</button>
      <button class="titlebar-btn btn-close" onclick="closeWin()" title="닫기">✕</button>
    </div>
  </div>
  <div class="content">
    <div class="spinner"></div>
    <div class="title">WatchService Agent</div>
    <div class="subtitle">서비스를 시작하는 중입니다...</div>
  </div>
  <script>
    function minimize() {
      if (window.electronAPI) window.electronAPI.minimizeWindow();
    }
    function closeWin() {
      if (window.electronAPI) window.electronAPI.closeWindow();
      else window.close();
    }
  </script>
</body>
</html>
