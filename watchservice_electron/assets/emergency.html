<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>긴급 경보 — 랜섬웨어 탐지</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #7f0000;
      color: #fff;
      font-family: 'Segoe UI', Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      padding: 40px;
      animation: pulse 1.2s ease-in-out infinite alternate;
    }
    @keyframes pulse {
      from { background: #7f0000; }
      to   { background: #c0392b; }
    }
    .icon { font-size: 72px; margin-bottom: 20px; }
    h1 { font-size: 42px; font-weight: 900; letter-spacing: 2px; margin-bottom: 12px; }
    .subtitle { font-size: 20px; opacity: 0.85; margin-bottom: 32px; }
    .info-box {
      background: rgba(0,0,0,0.3);
      border-radius: 10px;
      padding: 18px 28px;
      margin-bottom: 36px;
      min-width: 340px;
      font-size: 14px;
      line-height: 2;
      text-align: left;
    }
    .info-box span { opacity: 0.7; }
    .btn {
      background: #fff;
      color: #7f0000;
      border: none;
      padding: 14px 48px;
      font-size: 17px;
      font-weight: 700;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 1px;
    }
    .btn:hover { background: #ffd0d0; }
    .bottom-note { margin-top: 20px; font-size: 12px; opacity: 0.6; }
  </style>
</head>
<body>
  <div class="icon">⚠️</div>
  <h1>랜섬웨어 탐지</h1>
  <p class="subtitle">즉시 대응이 필요합니다</p>

  <div class="info-box" id="infoBox">
    <div><span>탐지 시각:</span> <strong id="detectedAt">–</strong></div>
    <div><span>위험도:</span> <strong>DANGER</strong></div>
    <div><span>패밀리:</span> <strong id="family">–</strong></div>
    <div><span>대응 가이드:</span><br><strong id="guidance">대시보드에서 상세 내용을 확인하세요.</strong></div>
  </div>

  <button class="btn" onclick="window.close()">확인</button>
  <p class="bottom-note">이 창을 닫으면 대시보드에서 상세 내용을 확인할 수 있습니다.</p>

  <script>
    // URL 파라미터로 알림 정보 수신
    const params = new URLSearchParams(window.location.search);
    const detectedAt = params.get('detectedAt');
    const family     = params.get('family');
    const guidance   = params.get('guidance');

    if (detectedAt) document.getElementById('detectedAt').textContent = detectedAt;
    if (family && family !== 'null') document.getElementById('family').textContent = family;
    if (guidance && guidance !== 'null') document.getElementById('guidance').textContent = guidance;

    // 경보음: Web Audio API
    try {
      const ctx = new AudioContext();
      function beep(freq, start, dur) {
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type = 'sawtooth';
        o.frequency.value = freq;
        g.gain.setValueAtTime(0.4, ctx.currentTime + start);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + start + dur);
        o.start(ctx.currentTime + start);
        o.stop(ctx.currentTime + start + dur);
      }
      // 삼중 경보음
      beep(880, 0.0, 0.25);
      beep(660, 0.3, 0.25);
      beep(880, 0.6, 0.40);
    } catch (_) {}
  </script>
</body>
</html>
