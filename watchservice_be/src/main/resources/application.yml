spring:
  application:
    name: watchservice-agent

  main:
    headless: true

  datasource:
    url: jdbc:sqlite:log.db          # ✅ 프로젝트 루트에 log.db 생성/사용
    driver-class-name: org.sqlite.JDBC
    username: ""                     # SQLite는 보통 계정/비번 없음
    password: ""

  sql:
    init:
      mode: never                    # 스키마 자동 초기화 안 씀 (우리가 코드로 CREATE TABLE 함)

  # 이메일 알림 (DANGER 탐지 시 발송)
  # SMTP_USERNAME/SMTP_PASSWORD 환경변수로 설정. 미설정 시 이메일 알림 비활성화.
  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  servlet:
    session:
      timeout: 30m   # 30분 비활동 시 세션 만료

# HTTPS 설정 (실서버 배포 시 아래 주석 해제 후 인증서 경로/비밀번호 지정)
# 방법 1) Spring Boot 내장 SSL (Let's Encrypt p12 변환 후):
# server:
#   ssl:
#     key-store: classpath:keystore.p12
#     key-store-password: ${SSL_KEY_STORE_PASSWORD}
#     key-store-type: PKCS12
#   port: 443
#
# 방법 2) Nginx 리버스 프록시 (권장) — Spring Boot는 8080 유지, Nginx에서 443 → 8080 포워딩

management:
  endpoints:
    web:
      exposure:
        include: health   # health 엔드포인트만 외부 노출
  endpoint:
    health:
      show-details: never  # 내부 상세 정보 숨김 (운영 보안)

# 로그 설정은 logback-spring.xml 참조 (파일 롤링 포함)
# SQL 상세 로그 보려면 --spring.profiles.active=dev 로 실행

ai:
  analyze:
    url: ${AI_ANALYZE_URL:https://web-production-728bf.up.railway.app/api/analyze}
  family:
    url: ${AI_FAMILY_URL:https://web-production-728bf.up.railway.app/predict}
  connect-timeout-ms: ${AI_CONNECT_TIMEOUT_MS:5000}
  read-timeout-ms: ${AI_READ_TIMEOUT_MS:15000}

# Gemini (LLM guidance)
# - API Key는 절대 프론트에 노출하지 말고 서버 환경변수로만 주입
gemini:
  api-key: ${GEMINI_API_KEY:}
  model: ${GEMINI_MODEL:gemini-2.5-flash}
  timeout-ms: ${GEMINI_TIMEOUT_MS:10000}

cors:
  # 실서버 배포 시 CORS_ALLOWED_ORIGINS 환경변수로 실제 도메인만 지정
  # 예: CORS_ALLOWED_ORIGINS=https://example.com
  # 주의: localhost:5173(Vite dev) 등 개발 주소는 운영 환경에서 제외할 것
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

admin:
  username: ${ADMIN_USERNAME:admin}
  # 반드시 BCrypt 해시로 설정해야 로그인 가능 (평문 비밀번호는 차단됨)
  # BCrypt 해시 생성: new BCryptPasswordEncoder().encode("yourPassword")
  # 예: ADMIN_PASSWORD=$2a$10$xxx...
  # ⚠ 기본값(123456789)을 그대로 두면 관리자 로그인이 차단됩니다.
  password: ${ADMIN_PASSWORD:$2b$12$jw2C0RVKMgk9qj.1v6nm0O81arkMq4Vbqst4MwR0I/e1GgMOCsOMC}

user:
  # 일반 사용자 인증 활성화 여부 (기본: 비활성)
  # USER_AUTH_ENABLED=true 설정 시 USER_PASSWORD도 반드시 설정해야 함
  auth:
    enabled: ${USER_AUTH_ENABLED:false}
  # 일반 사용자 접속 비밀번호 (USER_AUTH_ENABLED=true 일 때 필수)
  # BCrypt 해시로 설정하면 BCrypt 검증, 평문이면 평문 비교 (경고 로그 출력)
  password: ${USER_PASSWORD:}

watchservice:
  analytics:
    window-ms: 3000
    touch-session-timeout-ms: 300000
    rename-max-gap-ms: 2000

    encrypt:
      entropy-diff-threshold: 0.30
      min-size-bytes: 4096
      eps: 1.0e-6
      absolute-entropy-threshold: 7.2

    entropy:
      significant-diff-threshold: 0.05

    random-ext:
      min-count: 2
      min-length: 4
      whitelist: "txt,log,doc,docx,xls,xlsx,pdf,png,jpg,jpeg,gif,zip,rar,7z,html,htm,json,yaml,yml,java,pptx,ppt,csv,flac,webm,webp,tiff,bmp,conf,toml,sqlite,mpeg,opus"
      uniform-ext-min-count: 3
