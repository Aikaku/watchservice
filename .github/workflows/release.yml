name: Build & Release Installers

# v로 시작하는 태그 푸시 시 실행 (예: git tag v1.0.0 && git push origin v1.0.0)
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # GitHub Release 생성 권한

jobs:
  # ──────────────────────────────────────────────
  # macOS 빌드 → .dmg
  # ──────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: watchservice_fe/package-lock.json

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build React
        working-directory: watchservice_fe
        run: |
          npm ci
          npm run build

      - name: Copy React build to Spring Boot static
        run: |
          rm -rf watchservice_be/src/main/resources/static
          mkdir -p watchservice_be/src/main/resources/static
          cp -r watchservice_fe/build/. watchservice_be/src/main/resources/static/

      - name: Build Spring Boot JAR
        working-directory: watchservice_be
        run: ./gradlew build -x test

      - name: Generate minimal JRE (jlink)
        run: |
          chmod +x jre_build.sh
          ./jre_build.sh

      - name: Install Electron dependencies
        working-directory: watchservice_electron
        run: npm ci

      - name: Build macOS DMG
        working-directory: watchservice_electron
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: watchservice_electron/dist/*.dmg
          if-no-files-found: error

  # ──────────────────────────────────────────────
  # Windows 빌드 → .msi
  # ──────────────────────────────────────────────
  build-win:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: watchservice_fe/package-lock.json

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build React
        working-directory: watchservice_fe
        run: |
          npm ci
          npm run build

      - name: Copy React build to Spring Boot static
        shell: pwsh
        run: |
          if (Test-Path watchservice_be/src/main/resources/static) {
            Remove-Item -Recurse -Force watchservice_be/src/main/resources/static
          }
          New-Item -ItemType Directory -Force watchservice_be/src/main/resources/static | Out-Null
          Copy-Item -Recurse watchservice_fe/build/* watchservice_be/src/main/resources/static/

      - name: Build Spring Boot JAR
        working-directory: watchservice_be
        run: ./gradlew.bat build -x test

      - name: Generate minimal JRE (jlink)
        shell: cmd
        run: jre_build.bat

      - name: Install Electron dependencies
        working-directory: watchservice_electron
        run: npm ci

      - name: Build Windows MSI
        working-directory: watchservice_electron
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: win-installer
          path: watchservice_electron/dist/*.msi
          if-no-files-found: error

  # ──────────────────────────────────────────────
  # GitHub Release 생성 및 인스톨러 업로드
  # ──────────────────────────────────────────────
  release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS installer
        uses: actions/download-artifact@v4
        with:
          name: mac-installer
          path: dist/

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: win-installer
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "WatchService Agent ${{ github.ref_name }}"
          body: |
            ## WatchService Agent ${{ github.ref_name }}

            랜섬웨어 실시간 탐지 데스크탑 앱

            ### 다운로드

            | OS | 파일 | 비고 |
            |---|---|---|
            | Windows 10/11 (64bit) | `.msi` | Java 설치 불필요 |
            | macOS 11+ (Intel/Apple Silicon) | `.dmg` | Java 설치 불필요 |

            ### 설치 방법
            1. 운영체제에 맞는 인스톨러 다운로드
            2. 설치 후 WatchService Agent 실행
            3. 시스템 트레이에 아이콘 확인

            > AI 분석 서버(클라우드)와의 연결이 필요합니다.
          files: dist/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
